# This is an example goreleaser config file for mdev
# For more options, see: https://goreleaser.com/customization/

version: 2

project_name: mdev

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: mdev
    main: .
    binary: mdev
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/sombi/mobile-dev-helper/internal/version.Version={{.Version}}
      - -X github.com/sombi/mobile-dev-helper/internal/version.Commit={{.Commit}}
      - -X github.com/sombi/mobile-dev-helper/internal/version.Date={{.Date}}

archives:
  - id: mdev
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: sombi
    name: mobile-dev-helper
  draft: true
  prerelease: auto
  name_template: "{{.ProjectName}}-v{{.Version}}"

